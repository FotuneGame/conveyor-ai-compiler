version: '3.8'

services:
  compiler:
    build: .
    container_name: compiler
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - URL_CORS=http://localhost:3000 https://localhost:3000 http://localhost https://localhost
      - DEV=true
      - HASH_ROUNDS=12
      - LOG_LEVEL=debug
      - LOG_PATH=/app/logs
      - LOG_MAX_SIZE=5242880
      - LOG_MAX_FILES=5
      - LOG_MAX_DAYS=30
      - BACKEND_URL=http://localhost:5000
      - COMPILER_SECRET=test-compiler-secret
      - GITLAB_URL=http://localhost:5080
      - GITLAB_REGISTRY_URL=http://localhost:5081  
      - GITLAB_TOKEN=glpat-JoNgYIAaFemMZyYxjVSFAm86MQp1OjEH.01.0w0mp3fsa
      - KEEP_TEMP_FILES=false
      - COMPILER_TEMP_DIR=/app/tmp/compiler-projects
      - ENV_PATH=/app/public/example.env
    volumes:
      - ./logs:/app/logs
      - ./public:/app/public
      - ./tmp/compiler-projects:/app/tmp/compiler-projects
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      gitlab:
        condition: service_healthy
  
  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: gitlab
    restart: always
    ports:
      - "5022:22"
      - "5080:80"
      - "5081:5081"
    volumes:
      - gitlab-config:/etc/gitlab
      - gitlab-logs:/var/log/gitlab
      - gitlab-data:/var/opt/gitlab
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/-/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    environment:
      GITLAB_ROOT_EMAIL: titovgrisha04@gmail.com
      GITLAB_ROOT_PASSWORD: MySecurePass123!
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:5080'
        gitlab_rails['gitlab_shell_ssh_port'] = 5022
        nginx['listen_port'] = 80
        gitlab_rails['gitlab_url'] = 'http://gitlab:80'
        gitlab_rails['internal_clone_url'] = 'http://gitlab:80'
        gitlab_rails['registry_enabled'] = true
        registry_external_url 'http://localhost:5081'
        registry['external_url'] = 'http://localhost:5081'

  gitlab-runner:
    image: 'gitlab/gitlab-runner:latest'
    container_name: gitlab-runner
    restart: unless-stopped
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
      - gitlab-runner-config:/etc/gitlab-runner
    network_mode: "host"
    environment:
      - CI_SERVER_URL=http://localhost:5080
      - REGISTER_NON_INTERACTIVE=true
      - REGISTRATION_TOKEN=glrt-5x4NP68im_ayJyaOJ4c6lm86MQp0OjEKdToxCw.01.12153558l
    entrypoint: /bin/sh
    command: >
      -c '
        echo "=== Runner starting ==="
        if [ ! -f /etc/gitlab-runner/config.toml ] || ! grep -q "token" /etc/gitlab-runner/config.toml; then
          echo "Registering runner...";
          gitlab-runner register \
            --non-interactive \
            --url "$$CI_SERVER_URL" \
            --registration-token "$$REGISTRATION_TOKEN" \
            --executor docker \
            --docker-image alpine:latest \
            --docker-network-mode host \
            --docker-privileged=true \
            --docker-volumes /var/run/docker.sock:/var/run/docker.sock \
            --run-untagged=true \
            --locked=false \
            --description "docker-runner";
        else
          echo "Runner already registered, reconfiguring...";
        fi
        echo "Starting gitlab-runner...";
        gitlab-runner run
      '
    depends_on:
      gitlab:
        condition: service_healthy

volumes:
  gitlab-config:
  gitlab-logs:
  gitlab-data:
  gitlab-runner-config:

networks:
  app-network:
    driver: bridge