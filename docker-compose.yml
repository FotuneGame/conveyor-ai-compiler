version: '3.8'

name: conveyor-ai-compiler
services:
  compiler:
    build: .
    container_name: compiler
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - LOG_PATH=./logs
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:5000/health | grep -q '^200$'"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge