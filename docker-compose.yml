version: '3.8'

services:
  compiler:
    build: .
    container_name: compiler
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - URL_CORS=http://localhost:3000 https://localhost:3000 http://localhost https://localhost
      - DEV=true
      - HASH_ROUNDS=12
      - LOG_LEVEL=debug
      - LOG_PATH=/app/logs
      - LOG_MAX_SIZE=5242880
      - LOG_MAX_FILES=5
      - LOG_MAX_DAYS=30
      - BACKEND_URL=http://localhost:5000
      - COMPILER_SECRET=test-compiler-secret
      - GITLAB_BASE_URL=http://localhost:8080
      - GITLAB_TOKEN=glpat-xs8lA5qHIjwmp7e__F4nSm86MQp1OjEH.01.0w1giv585
      - GITLAB_INTERNAL_URL=http://gitlab:80
      - KEEP_TEMP_FILES=false
      - COMPILER_TEMP_DIR=/app/tmp/compiler-projects
      - ENV_PATH=/app/public/example.env
    volumes:
      - ./logs:/app/logs
      - ./public:/app/public
      - ./tmp/compiler-projects:/app/tmp/compiler-projects
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network
    depends_on:
      gitlab:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: gitlab-redis
    restart: always
    command: --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - gitlab-network

  postgresql:
    image: postgres:16-alpine
    container_name: gitlab-postgresql
    restart: always
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    networks:
      - gitlab-network
    environment:
      - POSTGRES_USER=gitlab
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=gitlabhq_production

  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: gitlab
    restart: always
    ports:
      - "8080:80"
      - "8022:22"
    volumes:
      - gitlab-config:/etc/gitlab
      - gitlab-logs:/var/log/gitlab
      - gitlab-data:/var/opt/gitlab
    networks:
      - gitlab-network
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/-/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    environment:
      - GITLAB_ROOT_PASSWORD=MySecurePass123!
      - GITLAB_OMNIBUS_CONFIG=external_url 'http://localhost:8080'; nginx['listen_port']=80; gitlab_rails['gitlab_shell_ssh_port']=8022

  gitlab-runner:
    image: gitlab/gitlab-runner:latest
    container_name: gitlab-runner
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    privileged: true
    command:
      - |
        if [ ! -f /etc/gitlab-runner/config.toml ]; then
          echo "🔄 Registering GitLab Runner..."
          gitlab-runner register --non-interactive \
            --url http://gitlab:80 \
            --token glrt-J7b846axwBjrj0Q5mU3b9m86MQp0OjEKdToxCw.01.120y9u5o4 \
            --tag-list compiler \
            --executor docker \
            --docker-privileged \
            --description 'compiler-runner' \
            --docker-image docker:latest \
            --docker-volumes /var/run/docker.sock:/var/run/docker.sock \
            --docker-volumes /cache
          echo "✅ Registration complete. Configure tags in GitLab UI."
        fi
        echo "🚀 Starting GitLab Runner..."
        gitlab-runner run
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - gitlab-network
    depends_on:
      gitlab:
        condition: service_healthy
    

volumes:
  redis-data:
  postgresql-data:
  gitlab-config:
  gitlab-logs:
  gitlab-data:

networks:
  app-network:
    driver: bridge
  gitlab-network:
    driver: bridge