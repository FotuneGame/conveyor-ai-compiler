version: '3.8'

name: conveyor-ai-compiler
services:
  compiler:
    build: .
    container_name: compiler
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - URL_CORS=http://localhost:3000 https://localhost:3000 http://localhost https://localhost
      - DEV=true
      - HASH_ROUNDS=12
      - LOG_LEVEL=debug
      - LOG_PATH=/app/logs
      - LOG_MAX_SIZE=5242880
      - LOG_MAX_FILES=5
      - LOG_MAX_DAYS=30
      - SWAGGER_TITLE=API Documentation
      - SWAGGER_DESCRIPTION=API для работы курсовой
      - SWAGGER_VERSION=1.0
      - SWAGGER_PATH=docs
      - SWAGGER_CONTACT_NAME=Developer
      - SWAGGER_CONTACT_URL=https://vk.com/id244759286
      - SWAGGER_CONTACT_EMAIL=titovgrisha04@gmail.com
      - MAX_REQUESTS_TTL_MS=5000
      - MAX_REQUESTS_LIMIT=10
      - COMPILER_SECRET=test-compiler-secret
      - GITLAB_BASE_URL=https://gitlab.com
      - GITLAB_TOKEN=your-gitlab-token-here
      - GITLAB_PROJECT_ID=0
      - GITLAB_NAMESPACE_ID=0
      - DOCKER_REGISTRY=registry.gitlab.com
      - COMPILER_TEMP_DIR=/app/tmp/compiler-projects
      - ENV_PATH=/app/public/example.env
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./public:/app/public
      - ./tmp/compiler-projects:/app/tmp/compiler-projects
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:5001/health | grep -q '^200$'"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s

networks:
  app-network:
    driver: bridge